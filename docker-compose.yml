services:
  claude-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-dev
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      - TZ=Europe/Moscow
      # HAPI listens on 0.0.0.0 so Coolify's Traefik can reach it from the docker network.
      - HAPI_LISTEN_HOST=0.0.0.0
      - HAPI_LISTEN_PORT=3006
      # Public HTTPS URL (set via Coolify env; must match the FQDN assigned to this app).
      - HAPI_PUBLIC_URL=${HAPI_PUBLIC_URL:-}
      # Enables the HAPI Telegram bot + Mini App (set via Coolify env; gitignored here).
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Long-lived Claude Code OAuth token from `claude setup-token` (subscription auth).
      # Set via Coolify env; gitignored here.
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Tell Claude we're in a sandbox so `--dangerously-skip-permissions`
      # (what HAPI's --yolo maps to) is allowed despite running as root.
      # Without this Claude refuses and HAPI sessions die with "exit code 1".
      - IS_SANDBOX=1
    expose:
      - "3006"
      - "5050"
    # Join the shared coolify network so coolify-proxy (Traefik) can route to us.
    networks:
      - coolify
    labels:
      - traefik.enable=true
      # HAPI (port 3006)
      - traefik.http.routers.claude-dev.entrypoints=https
      - traefik.http.routers.claude-dev.rule=Host(`hapi.proxyz.stream`)
      - traefik.http.routers.claude-dev.tls=true
      - traefik.http.routers.claude-dev.tls.certresolver=letsencrypt
      - traefik.http.routers.claude-dev.service=claude-dev
      - traefik.http.services.claude-dev.loadbalancer.server.port=3006
      # RUBRIC dashboard (port 5050) — second service on the same container
      - traefik.http.routers.rubric.entrypoints=https
      - traefik.http.routers.rubric.rule=Host(`rubric.proxyz.stream`)
      - traefik.http.routers.rubric.tls=true
      - traefik.http.routers.rubric.tls.certresolver=letsencrypt
      - traefik.http.routers.rubric.middlewares=rubric-auth@docker
      - traefik.http.routers.rubric.service=rubric
      - traefik.http.services.rubric.loadbalancer.server.port=5050
      - traefik.http.middlewares.rubric-auth.basicauth.users=admin:{SHA}g67WDnvMOvofoY6DDx899kLSLtU=
    volumes:
      # Workspace: all git clones / work-in-progress live here
      - claude-dev-workspace:/workspace
      # Persistent auth/config for hapi, claude, gh, git
      - claude-dev-home:/root

volumes:
  claude-dev-workspace:
  claude-dev-home:

networks:
  coolify:
    external: true
